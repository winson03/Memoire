<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#3A322A;-webkit-font-smoothing:antialiased;background:#F6EDE1;}
input,textarea,button,select{font-family:inherit;}
button{cursor:pointer;}
::placeholder{color:rgba(58,50,42,0.35);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px) scale(0.985);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes floatA{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(46px,-38px) scale(1.08);}}
@keyframes floatB{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-34px,40px) scale(0.92);}}
@keyframes floatC{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,30px) scale(1.05);}}
@keyframes cardFloat{0%,100%{transform:var(--rot) translateY(0);}50%{transform:var(--rot) translateY(-12px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.45;}}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:rgba(150,110,80,0.22);border-radius:8px;border:3px solid transparent;background-clip:content-box;}
</style>
</helmet>

<div style="{{ rootStyle }}">

<!-- WARM ORBS -->
<div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;">
  <div style="position:absolute;width:760px;height:760px;background:radial-gradient(circle,rgba(214,120,72,0.22) 0%,transparent 66%);border-radius:50%;top:-220px;right:-180px;animation:floatA 16s ease-in-out infinite;"></div>
  <div style="position:absolute;width:660px;height:660px;background:radial-gradient(circle,rgba(224,160,84,0.20) 0%,transparent 66%);border-radius:50%;bottom:-180px;left:-140px;animation:floatB 19s ease-in-out infinite;"></div>
  <div style="position:absolute;width:540px;height:540px;background:radial-gradient(circle,rgba(196,108,118,0.16) 0%,transparent 66%);border-radius:50%;top:44%;left:40%;animation:floatC 14s ease-in-out infinite;"></div>
</div>

<div style="position:relative;z-index:1;min-height:100vh;">

<!-- ===================== LOGIN ===================== -->
<sc-if value="{{ isLogin }}" hint-placeholder-val="{{ false }}">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:420px;background:rgba(255,255,255,0.6);backdrop-filter:blur(34px);-webkit-backdrop-filter:blur(34px);border:1px solid rgba(255,255,255,0.85);border-radius:24px;padding:42px 40px;box-shadow:0 34px 80px rgba(60,40,28,0.18);text-align:center;animation:fadeUp .55s ease both;">
    <div style="width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,var(--accent,#C2683E),var(--accent-alt,#E0A054));color:#FFF8F0;display:flex;align-items:center;justify-content:center;font-family:var(--head-font,'Newsreader',serif);font-size:29px;font-weight:600;font-style:italic;margin:0 auto 22px;box-shadow:0 10px 24px rgba(194,104,62,0.32);">M</div>
    <h1 style="font-family:var(--head-font,'Newsreader',serif);font-weight:500;font-size:32px;margin:0 0 8px;color:#3A322A;">Welcome to Mémoire</h1>
    <p style="color:rgba(58,50,42,0.58);font-size:15px;margin:0 0 30px;line-height:1.5;">Sign in to write, organise and publish your stories.</p>
    <button onClick="{{ signIn }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.9);color:#3A322A;padding:14px;border-radius:13px;font-weight:600;font-size:15.5px;backdrop-filter:blur(8px);transition:transform .2s,box-shadow .2s;" style-hover="transform:translateY(-1px);box-shadow:0 10px 24px rgba(120,80,50,0.12);">
      <span style="width:22px;height:22px;border-radius:50%;background:conic-gradient(#EA4335 0 25%,#FBBC05 25% 50%,#34A853 50% 75%,#4285F4 75% 100%);display:inline-block;flex:none;"></span>
      Continue with Google
    </button>
    <div style="display:flex;align-items:center;gap:12px;margin:22px 0;color:rgba(58,50,42,0.35);font-size:12.5px;"><span style="flex:1;height:1px;background:rgba(150,110,80,0.18);"></span>or<span style="flex:1;height:1px;background:rgba(150,110,80,0.18);"></span></div>
    <button onClick="{{ signIn }}" style="width:100%;background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.7);color:rgba(58,50,42,0.7);padding:13px;border-radius:13px;font-weight:600;font-size:14.5px;backdrop-filter:blur(8px);transition:background .2s;" style-hover="background:rgba(255,255,255,0.6);">Continue as guest</button>
    <p style="color:rgba(58,50,42,0.4);font-size:12.5px;margin:22px 0 0;line-height:1.55;">Admins sign in with the same Google account.<br>Stories &amp; media stored securely via Telegram.</p>
    <button onClick="{{ toLanding }}" style="background:none;border:none;color:rgba(58,50,42,0.4);font-size:13px;margin-top:14px;transition:color .2s;" style-hover="color:rgba(58,50,42,0.75);">← Back home</button>
  </div>
</div>
</sc-if>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;accentFrom&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#C2683E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#C2683E&quot;,&quot;#C99020&quot;,&quot;#B07A4E&quot;,&quot;#A86A6E&quot;,&quot;#7E8A4E&quot;]},&quot;accentTo&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E0A054&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#E0A054&quot;,&quot;#D6A03A&quot;,&quot;#E0B070&quot;,&quot;#D0787A&quot;,&quot;#A8B070&quot;]},&quot;bgTint&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Cream&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;Cream&quot;,&quot;Linen&quot;,&quot;Blush&quot;]},&quot;headingStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Serif&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;Serif&quot;,&quot;Sans&quot;]}}">
class Component extends DCLogic {
  state = {
    screen: 'login',
    authed: false,
    query: '',
    openBookId: 1,
    favs: [3, 6],
    openFolderId: 1,
    editorStatus: 'published',
    editTitle: null,
    editBlurb: null,
    dialog: null,
    dialogInput: '',
    editorImages: [
      { id: 'p1', label: 'Harbor at dawn' },
      { id: 'p2', label: 'The old pier' },
      { id: 'p3', label: "Keeper's cottage" },
      { id: 'p4', label: 'Storm light' },
      { id: 'p5', label: 'Letters, 1961' },
      { id: 'p6', label: 'Last summer' },
    ],
  };

  themes = {
    terra: { background: 'linear-gradient(140deg,#C2683E 0%,#8A3E22 100%)' },
    sepia: { background: 'linear-gradient(140deg,#9A6A3C 0%,#5A3414 100%)' },
    olive: { background: 'linear-gradient(140deg,#8A9A4E 0%,#4A5A22 100%)' },
    blue:  { background: 'linear-gradient(140deg,#6E8794 0%,#3C5360 100%)' },
    plum:  { background: 'linear-gradient(140deg,#A06A86 0%,#5A3450 100%)' },
    ochre: { background: 'linear-gradient(140deg,#D69A3A 0%,#9A6A14 100%)' },
    slate: { background: 'linear-gradient(140deg,#E0A054 0%,#B0762E 100%)' },
    rose:  { background: 'linear-gradient(140deg,#D0787A 0%,#9A4448 100%)' },
  };

  rawFolders = [
    { id: 1, name: 'Travels', theme: 'terra' },
    { id: 2, name: 'Family',  theme: 'blue' },
    { id: 3, name: 'Letters', theme: 'sepia' },
  ];

  rawBooks = [
    { id:1, title:'The Lighthouse Years', author:'Eleanor Mercier', series:'Travels', collection:'Coastlines', folder:1, status:'published', theme:'terra', year:1998, views:1240, updated:'2 days ago', blurb:'Four summers on the Brittany coast, told in salt and lamplight.', photos:['Harbor at dawn','The old pier',"Keeper's cottage",'Storm light','Last summer'] },
    { id:2, title:'Letters to Marseille', author:'Eleanor Mercier', series:'Letters', collection:'Correspondence', folder:3, status:'published', theme:'sepia', year:2001, views:980, updated:'1 week ago', blurb:'A correspondence that crossed a sea and twenty years.', photos:['The first envelope','Rue de la Loge','A pressed ticket','Postmark, 1981'] },
    { id:3, title:"My Grandmother's Kitchen", author:'Priya Raman', series:'Family', collection:'The Kitchen', folder:2, status:'published', theme:'blue', year:2010, views:2210, updated:'3 days ago', blurb:'Recipes, hands, and the table that held us together.', photos:['Morning dough','Her hands','The blue bowl','Sunday table','After the meal'] },
    { id:4, title:'Summers in Provence', author:'Eleanor Mercier', series:'Travels', collection:'Coastlines', folder:1, status:'draft', theme:'olive', year:2015, views:0, updated:'yesterday', blurb:'Lavender, dust, and the long light of August.', photos:['Lavender rows','The dusty road','Midday shade'] },
    { id:5, title:'Paper Boats', author:'Lucas Vega', series:'Family', collection:'Childhood', folder:2, status:'private', theme:'plum', year:2018, views:0, updated:'5 days ago', blurb:'A childhood measured in rivers and rainy afternoons.', photos:['The river','Folded paper','Rainy window'] },
    { id:6, title:'The Long Way Home', author:'Priya Raman', series:'Travels', collection:'Crossings', folder:1, status:'published', theme:'ochre', year:2020, views:760, updated:'2 weeks ago', blurb:'Three trains, one promise, and the country in between.', photos:['Platform 4','Through the window','Night train','Arrival'] },
    { id:7, title:'Winter in Hokkaido', author:'Lucas Vega', series:'Travels', collection:'Crossings', folder:1, status:'published', theme:'slate', year:2022, views:540, updated:'1 month ago', blurb:'Snow that swallowed sound and gave back memory.', photos:['First snow','The quiet town','Steam and cold','Footprints'] },
    { id:8, title:'Field Notes', author:'Eleanor Mercier', series:'Letters', collection:'Correspondence', folder:3, status:'draft', theme:'rose', year:2024, views:0, updated:'4 hours ago', blurb:'Margins, pressed flowers, and a year of paying attention.', photos:['March margins','Pressed violet','A list of birds'] },
  ];

  go(s) { this.setState({ screen: s }); }
  signIn() { this.setState({ authed: true, screen: 'dashboard' }); }
  signOut() { this.setState({ authed: false, screen: 'landing' }); }
  toggleFav(id) { this.setState(s => ({ favs: s.favs.includes(id) ? s.favs.filter(x => x !== id) : [...s.favs, id] })); }
  openBook(id) { this.setState({ openBookId: id, screen: 'reader' }); }
  openFolder(id) { this.setState({ openFolderId: id }); }
  reorder(from, to) { if (from == null || from === to) return; this.setState(s => { const a = [...s.editorImages]; const [m] = a.splice(from, 1); a.splice(to, 0, m); return { editorImages: a }; }); }

  openConfirm(title, body, onYes) { this.setState({ dialog: { kind:'confirm', title, body, confirmLabel:'Delete', onYes } }); }
  openCreate(title, label, onCreate) { this.setState({ dialog: { kind:'create', title, label, confirmLabel:'Create', onCreate }, dialogInput: '' }); }
  closeDialog() { this.setState({ dialog: null }); }
  confirmDialog() {
    const d = this.state.dialog; if (!d) return;
    if (d.kind === 'create') { const v = this.state.dialogInput.trim(); this.setState({ dialog:null, dialogInput:'' }); if (v && d.onCreate) d.onCreate(v); }
    else { this.setState({ dialog: null }); if (d.onYes) d.onYes(); }
  }

  deleteBook(id) { this.rawBooks = this.rawBooks.filter(b => b.id !== id); if (this.state.openBookId === id) this.setState({ screen:'dashboard' }); else this.forceUpdate(); }
  deleteFolder(id) { this.rawFolders = this.rawFolders.filter(f => f.id !== id); this.rawBooks = this.rawBooks.filter(b => b.folder !== id); if (this.state.openFolderId === id) this.setState({ openFolderId: (this.rawFolders[0] || {}).id }); else this.forceUpdate(); }
  deleteCollection(folderId, name) { this.rawBooks = this.rawBooks.filter(b => !(b.folder === folderId && b.collection === name)); this.forceUpdate(); }
  addFolder(name) {
    const palette = ['olive','plum','ochre','slate','rose','blue','sepia','terra'];
    const id = this.rawFolders.length ? Math.max.apply(null, this.rawFolders.map(f => f.id)) + 1 : 1;
    this.rawFolders.push({ id, name, theme: palette[this.rawFolders.length % palette.length] });
    this.setState({ openFolderId: id, screen: 'folders' });
  }

  coverStyle(theme) {
    const t = this.themes[theme] || this.themes.terra;
    return { ...t, position:'relative', display:'flex', flexDirection:'column', justifyContent:'space-between', aspectRatio:'3 / 4', borderRadius:'15px', padding:'17px', boxShadow:'0 16px 38px rgba(60,40,28,0.28),inset 0 0 0 1px rgba(255,255,255,0.18)', overflow:'hidden' };
  }
  statusStyle(status) {
    const c = { published: 'var(--accent,#C2683E)', draft: '#C99020', private: 'rgba(58,50,42,0.4)' }[status] || 'rgba(58,50,42,0.4)';
    return { display:'inline-flex', alignItems:'center', gap:'6px', fontSize:'12.5px', fontWeight:600, color:c };
  }

  build(b) {
    const isFav = this.state.favs.includes(b.id);
    const statusLabel = b.status.charAt(0).toUpperCase() + b.status.slice(1);
    const metaRight = b.status === 'published' ? (b.views.toLocaleString() + ' readers') : ('Updated ' + b.updated);
    const ss = this.statusStyle(b.status);
    return { ...b, isFav, heart: isFav ? '♥' : '♡',
      tileStyle: { cursor:'pointer', display:'flex', flexDirection:'column', gap:'12px', animation:'fadeUp .5s ease both', transition:'transform .28s ease' },
      heartStyle: { cursor:'pointer', border:'none', background:'rgba(0,0,0,0.22)', width:'30px', height:'30px', borderRadius:'50%', color: isFav ? '#FFD9C2' : 'rgba(255,255,255,0.85)', fontSize:'15px', display:'flex', alignItems:'center', justifyContent:'center', lineHeight:1, backdropFilter:'blur(6px)' },
      onFav: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.toggleFav(b.id); },
      onOpen: () => this.openBook(b.id),
      onDelete: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.openConfirm('Delete this story?', '\u201C' + b.title + '\u201D and all its media will be permanently removed from Telegram. This can\u2019t be undone.', () => this.deleteBook(b.id)); },
      coverStyle: this.coverStyle(b.theme),
      statusStyle: ss, statusDot: ss.color, statusLabel, metaRight,
      readersTxt: b.status === 'published' ? b.views.toLocaleString() : '\u2014',
    };
  }

  filt(list) { const q = this.state.query.trim().toLowerCase(); if (!q) return list; return list.filter(b => (b.title + ' ' + b.author + ' ' + b.series + ' ' + (b.collection||'')).toLowerCase().includes(q)); }

  renderVals() {
    const S = this.state; const screen = S.screen;
    const appScreens = ['dashboard','folders','reader','editor','favourites','profile','admin','settings'];
    const books = this.rawBooks.map(b => this.build(b));
    const byId = id => books.find(b => b.id === id) || books[0];

    const accent = this.props.accentFrom ?? '#C2683E';
    const accentAlt = this.props.accentTo ?? '#E0A054';
    const tintMap = { Cream:'#F6EDE1', Linen:'#F1E6D6', Blush:'#F4E8E4' };
    const bg = tintMap[this.props.bgTint] ?? '#F6EDE1';
    const headFont = (this.props.headingStyle === 'Sans') ? "'Outfit', sans-serif" : "'Newsreader', 'Georgia', serif";

    const navDef = [
      { key:'dashboard', label:'Dashboard' },
      { key:'folders', label:'Folders & Collections' },
      { key:'favourites', label:'Favourites' },
      { key:'profile', label:'Profile' },
      { key:'settings', label:'Settings' },
      { key:'admin', label:'Admin' },
    ];
    const nav = navDef.map(n => {
      const active = screen === n.key || (n.key === 'dashboard' && (screen === 'reader' || screen === 'editor'));
      return { ...n, active, onClick: () => this.go(n.key),
        style: { display:'flex', alignItems:'center', gap:'12px', padding:'10px 12px', borderRadius:'10px', cursor:'pointer', fontSize:'14.5px', fontWeight: active ? 600 : 400, color: active ? '#3A322A' : 'rgba(58,50,42,0.5)', background: active ? 'rgba(194,104,62,0.12)' : 'transparent', transition:'background .2s,color .2s' },
        dotStyle: { width:'7px', height:'7px', borderRadius:'50%', background: active ? 'linear-gradient(135deg,' + accent + ',' + accentAlt + ')' : 'transparent', border: active ? 'none' : '1.5px solid rgba(58,50,42,0.25)', flex:'none' } };
    });

    const openFolder = this.rawFolders.find(f => f.id === S.openFolderId) || this.rawFolders[0] || { id:0, name:'', theme:'terra' };
    const folderBooks = this.filt(books.filter(b => b.folder === openFolder.id));
    const collNames = [...new Set(folderBooks.map(b => b.collection))];
    const folderGroups = collNames.map(c => ({ name: c, books: folderBooks.filter(b => b.collection === c),
      onDeleteColl: (e) => { if (e && e.stopPropagation) e.stopPropagation(); const n = folderBooks.filter(b => b.collection === c).length; this.openConfirm('Delete collection?', '\u201C' + c + '\u201D and its ' + n + ' stories will be removed from ' + openFolder.name + '.', () => this.deleteCollection(openFolder.id, c)); } }));
    const folders = this.rawFolders.map(f => {
      const fb = books.filter(b => b.folder === f.id);
      const colls = [...new Set(fb.map(b => b.collection))];
      return { ...f, count: fb.length, collCount: colls.length, onOpen: () => this.openFolder(f.id), coverThemes: fb.slice(0, 3).map(b => this.themes[b.theme]),
        onDelete: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.openConfirm('Delete folder?', 'Deleting \u201C' + f.name + '\u201D permanently removes its ' + fb.length + ' stories. This can\u2019t be undone.', () => this.deleteFolder(f.id)); } };
    });

    const openBook = byId(S.openBookId);
    const readerPhotos = openBook.photos.map((p, i) => ({ label: p, idx: i + 1 }));
    const moreByAuthor = books.filter(b => b.author === openBook.author && b.id !== openBook.id).slice(0, 3);

    const editorImages = S.editorImages.map((im, idx) => ({ ...im, num: idx + 1,
      onDragStart: () => { this.dragFrom = idx; },
      onDragOver: (e) => { e.preventDefault(); },
      onDrop: (e) => { e.preventDefault(); this.reorder(this.dragFrom, idx); this.dragFrom = null; },
      onRemove: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.setState(s => ({ editorImages: s.editorImages.filter((_, i) => i !== idx) })); },
    }));
    const addPhoto = () => this.setState(s => ({ editorImages: [...s.editorImages, { id: 'p' + Date.now(), label: 'New photo' }] }));

    const statusDefs = [
      { key:'published', label:'Published', desc:'Visible to everyone' },
      { key:'private', label:'Private', desc:'Only you can see it' },
      { key:'draft', label:'Draft', desc:'Not published yet' },
    ].map(d => ({ ...d, active: S.editorStatus === d.key, onClick: () => this.setState({ editorStatus: d.key }),
      style: { flex:1, cursor:'pointer', padding:'14px', borderRadius:'12px', border: S.editorStatus === d.key ? '1.5px solid var(--accent,#C2683E)' : '1px solid rgba(255,255,255,0.75)', background: S.editorStatus === d.key ? 'rgba(194,104,62,0.1)' : 'rgba(255,255,255,0.5)', backdropFilter:'blur(8px)' } }));

    const totalReaders = books.reduce((a, b) => a + b.views, 0);
    const adminStats = [
      { label:'Total stories', value: String(books.length) },
      { label:'Published', value: String(books.filter(b => b.status === 'published').length) },
      { label:'Drafts & private', value: String(books.filter(b => b.status !== 'published').length) },
      { label:'Total readers', value: totalReaders.toLocaleString() },
    ];
    const adminRows = this.filt(books).map(b => ({ ...b, folderName: (this.rawFolders.find(f => f.id === b.folder) || {}).name }));

    const favBooks = this.filt(books.filter(b => b.isFav));
    const favCount = books.filter(b => b.isFav).length;
    const d = S.dialog;

    const features = [
      { icon:'✦', title:'Write & arrange', body:'Drop in photos and films, drag them into order, and tell the story around them.', cardStyle:{ background:'rgba(255,255,255,0.5)', backdropFilter:'blur(18px)', WebkitBackdropFilter:'blur(18px)', border:'1px solid rgba(255,255,255,0.72)', borderRadius:'18px', padding:'28px', boxShadow:'0 10px 30px rgba(120,80,50,0.08)', transition:'transform .25s,box-shadow .25s', animation:'fadeUp .6s ease both .15s' } },
      { icon:'◈', title:'Folders & collections', body:'Organise stories into folders and themed collections that grow over years.', cardStyle:{ background:'rgba(255,255,255,0.5)', backdropFilter:'blur(18px)', WebkitBackdropFilter:'blur(18px)', border:'1px solid rgba(255,255,255,0.72)', borderRadius:'18px', padding:'28px', boxShadow:'0 10px 30px rgba(120,80,50,0.08)', transition:'transform .25s,box-shadow .25s', animation:'fadeUp .6s ease both .25s' } },
      { icon:'◎', title:'Publish or keep private', body:'Share with everyone, keep it just for you, or save as draft until it\u2019s ready.', cardStyle:{ background:'rgba(255,255,255,0.5)', backdropFilter:'blur(18px)', WebkitBackdropFilter:'blur(18px)', border:'1px solid rgba(255,255,255,0.72)', borderRadius:'18px', padding:'28px', boxShadow:'0 10px 30px rgba(120,80,50,0.08)', transition:'transform .25s,box-shadow .25s', animation:'fadeUp .6s ease both .35s' } },
    ];

    return {
      rootStyle: { '--accent': accent, '--accent-alt': accentAlt, '--head-font': headFont, minHeight:'100vh', background: bg, color:'#3A322A' },
      isLanding: screen === 'landing', isLogin: screen === 'login', isApp: S.authed && appScreens.includes(screen),
      isDashboard: screen === 'dashboard', isFolders: screen === 'folders', isReader: screen === 'reader', isEditor: screen === 'editor', isFav: screen === 'favourites', isProfile: screen === 'profile', isAdmin: screen === 'admin', isSettings: screen === 'settings',
      pageTitle: ({ dashboard:'Dashboard', folders:'Folders & Collections', favourites:'Favourites', profile:'Profile', admin:'Admin · Overview', reader:'Reading', editor:'Story editor', settings:'Settings' })[screen] || '',
      nav, books, features,
      discover: this.filt(books.filter(b => b.status === 'published')),
      yourBooks: books.filter(b => b.author === 'Eleanor Mercier'),
      favBooks, favCount, hasFavs: favCount > 0, noFavs: favCount === 0,
      folders, openFolder, folderGroups,
      openBook, readerPhotos, moreByAuthor,
      readerFavLabel: openBook.isFav ? '♥ In favourites' : '♡ Add to favourites',
      editorImages, addPhoto, statusDefs,
      editorTitle: S.editTitle ?? openBook.title, editorBlurb: S.editBlurb ?? openBook.blurb,
      onEditTitle: (e) => this.setState({ editTitle: e.target.value }), onEditBlurb: (e) => this.setState({ editBlurb: e.target.value }),
      adminStats, adminRows, query: S.query, onSearch: (e) => this.setState({ query: e.target.value }),
      toDash: () => this.go('dashboard'), toFolders: () => this.go('folders'), toFav: () => this.go('favourites'),
      toProfile: () => this.go('profile'), toAdmin: () => this.go('admin'), toLogin: () => this.go('login'),
      toEditor: () => this.go('editor'), toLanding: () => this.go('landing'), toSettings: () => this.go('settings'),
      signIn: () => this.signIn(), signOut: () => this.signOut(),
      backFromReader: () => this.go('dashboard'), editOpen: () => this.go('editor'),
      readerFav: () => this.toggleFav(openBook.id),
      deleteOpenBook: () => openBook.onDelete(),
      onNewFolder: () => this.openCreate('New folder', 'Folder name', (name) => this.addFolder(name)),
      onNewCollection: () => this.openCreate('New collection', 'Collection name in ' + openFolder.name, () => this.go('editor')),
      dialogOpen: !!d, isCreateDialog: !!(d && d.kind === 'create'), isConfirmDialog: !!(d && d.kind === 'confirm'),
      dialogTitle: d ? d.title : '', dialogBody: d && d.kind === 'confirm' ? d.body : '', dialogLabel: d && d.kind === 'create' ? d.label : '',
      dialogConfirmLabel: d ? d.confirmLabel : '',
      dialogConfirmStyle: { border:'none', padding:'11px 20px', borderRadius:'11px', fontWeight:700, fontSize:'14.5px', color:'#FFF8F0', background: d && d.kind === 'confirm' ? 'linear-gradient(135deg,#C8564A,#9A332A)' : 'linear-gradient(135deg,' + accent + ',' + accentAlt + ')' },
      dialogInput: S.dialogInput, onDialogInput: (e) => this.setState({ dialogInput: e.target.value }),
      dialogConfirm: () => this.confirmDialog(), dialogCancel: () => this.closeDialog(),
      stopClick: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },
    };
  }
}
</script>
</body>
